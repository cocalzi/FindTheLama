<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="" type="" href="" />
  <!--Google Font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lama</title>
  <script type="module" crossorigin src="./assets/index-CZdZQsVr.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-C_7QxyP5.css">
</head>

<body>
  <main>
    <section id="home">
      <header>
        <h1>Benvenuto</h1>
      </header>
      <div class="homescreen-container">
        <img src="./assets/FindTheLama3-Da2zaiq8.png">
      </div>
      <div class="button-container">
        <button id="btnHome" class="button">Inizia</button>
      </div>
    </section>
    <section id="choosePlayers">
      <header>
        <h1>Configura la partita</h1>
      </header>
      <div id="choosePlayerContainer" class="choosePlayers-container">
        <label>Numero giocatori:</label>
        <div class="lama-number-container">
          <input id="inputPlayersNumber" type="number"><button id="generatePlayersInputBtn"
            class="generatePlayer-style">Genera</button>
        </div>
        <label>Numero Lama:</label>
        <div class="lama-number-container">
          <button id="decrease" class="plusminus-style">-</button><input id="lamasInput" type="number" readonly><button
            id="increase" class="plusminus-style">+</button>
        </div>
      </div>
      <div class="button-container">
        <button id="btnPlay" class="button">Gioca</button>
      </div>
    </section>
    <section id="showCards">
      <header>
        <h1>Guarda la parola</h1>
      </header>
      <div class="homescreen-container">
        <div class="card-container">
          <h2 id="playerName">Giocatore</h2>
          <div id="wordContainer" class="wordContainer-style">
            <p id="initialPhrase"></p>
            <h1 id="playerWord">Parola</h1>
          </div>
          <div class="showWordBtn-container-style">
            <button id="showWordBtn" style="user-select: none;">Rivela</button>
          </div>
        </div>
      </div>
      <div class="button-container">
        <button id="nextPlayerBtn" class="button">Giocatore successivo</button>
      </div>
    </section>
    <section id="finalScreen">
      <header>
        <h1>Inizia:</h1>
      </header>
      <div class="homescreen-container">
        <h1 id="playerFirst">Nome giocatore</h1>
      </div>
      <div class="button-container">
        <button id="btnPlayAgain" class="button">Nuova partita</button>
        <button id="setPlayersAgain" class="button">Reimposta giocatori</button>
      </div>
    </section>
  </main>
</body>

</html>
